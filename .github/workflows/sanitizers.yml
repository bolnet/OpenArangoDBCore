name: Sanitizers (ASan + UBSan)

on:
  push:
    branches: [main]

concurrency:
  group: sanitizers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asan-ubsan:
    name: ASan + UBSan (Ubuntu 24.04, GCC 14)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      CC: gcc-14
      CXX: g++-14
      ASAN_OPTIONS: "detect_odr_violation=2:detect_leaks=1:halt_on_error=1"
      UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            libssl-dev libldap-dev \
            gcc-14 g++-14

      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
          key: cmake-deps-sanitizers-${{ hashFiles('tests/CMakeLists.txt') }}
          restore-keys: |
            cmake-deps-sanitizers-

      - name: Configure (Debug + ASan + UBSan)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DBUILD_TESTING=ON \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests under sanitizers
        working-directory: build
        run: |
          set -euo pipefail
          FAILED=0
          TOTAL=0
          PASSED=0

          for test_bin in $(find . -maxdepth 4 -type f -name '*_test' -executable | sort); do
            echo "=========================================="
            echo "Running: ${test_bin}"
            echo "=========================================="
            TOTAL=$((TOTAL + 1))
            if "${test_bin}" --gtest_output=xml:"${test_bin}.xml" 2>&1; then
              PASSED=$((PASSED + 1))
            else
              echo "FAILED (sanitizer or test error): ${test_bin}"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "=========================================="
          echo "Sanitizer Summary: ${PASSED}/${TOTAL} passed, ${FAILED} failed"
          echo "=========================================="

          if [ "${FAILED}" -ne 0 ]; then
            exit 1
          fi

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-test-results
          path: build/**/*.xml
          retention-days: 14
