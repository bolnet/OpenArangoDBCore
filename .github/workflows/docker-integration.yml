name: docker-integration

on:
  push:
    branches: [main]
    paths:
      - 'scripts/Dockerfile.integration'
      - 'enterprise/**'
      - 'src/**'
      - 'include/**'
      - '.github/workflows/docker-integration.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: short SHA)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/Dockerfile.integration
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/openarangodb-integration:${{ steps.tag.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/openarangodb-integration:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
